<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic 3D Solar System | Accurate Model</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .three-container { background: #000; }
        .planet-label { position: absolute; background: rgba(0,0,0,0.7); color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; pointer-events: none; }
        .info-panel { max-height: 70vh; overflow-y: auto; }
    </style>
</head>
<body class="bg-[#0a0a0f] text-white">
    <!-- Top Navigation -->
    <nav class="border-b border-white/10 bg-black/80 backdrop-blur-lg fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-gradient-to-br from-orange-500 to-yellow-500 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-sun text-white text-xl"></i>
                </div>
                <div>
                    <span class="font-semibold text-2xl tracking-tight">Solar System</span>
                    <span class="text-xs text-orange-400 font-mono ml-2">REAL SCALE 3D</span>
                </div>
            </div>
            
            <div class="flex items-center gap-x-4 text-sm">
                <div class="flex items-center gap-x-2 bg-white/5 px-4 py-1.5 rounded-3xl">
                    <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                    <span class="text-emerald-400">Live Simulation</span>
                </div>
                <a href="https://github.com/sravanrc1999/realistic-3d-solar-system" target="_blank" 
                   class="flex items-center gap-x-2 px-4 py-2 rounded-3xl border border-white/20 hover:bg-white/5 transition-colors">
                    <i class="fa-brands fa-github"></i>
                    <span>GitHub</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="flex pt-16 h-screen">
        <!-- 3D Canvas -->
        <div class="flex-1 relative three-container">
            <canvas id="canvas" class="w-full h-full"></canvas>
            
            <!-- Overlay Controls -->
            <div class="absolute top-6 left-6 bg-black/70 backdrop-blur-xl rounded-3xl p-4 border border-white/10">
                <div class="flex items-center gap-x-3 mb-3">
                    <button id="pause-btn" onclick="togglePause()"
                            class="px-5 py-2 bg-white/10 hover:bg-white/20 rounded-2xl flex items-center gap-x-2 text-sm">
                        <i class="fa-solid fa-pause" id="pause-icon"></i>
                        <span id="pause-text">Pause</span>
                    </button>
                    <button onclick="resetCamera()" 
                            class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-2xl text-sm flex items-center gap-x-2">
                        <i class="fa-solid fa-sync"></i>
                        <span>Reset View</span>
                    </button>
                </div>
                
                <div class="flex items-center gap-x-3">
                    <span class="text-xs text-white/60 w-12">Speed</span>
                    <input type="range" id="speed-slider" min="1" max="5000" step="1" value="100" 
                           class="w-40 accent-orange-500" oninput="updateSpeed()">
                    <span id="speed-value" class="font-mono text-orange-400 w-16 text-right">100×</span>
                </div>
            </div>

            <div class="absolute bottom-6 left-6 text-xs text-white/50 font-mono">
                Drag to rotate • Scroll to zoom • Click planets for data
            </div>
        </div>

        <!-- Info Sidebar -->
        <div class="w-96 border-l border-white/10 bg-[#111113] p-6 overflow-y-auto" id="sidebar">
            <div id="default-info">
                <div class="text-center py-12">
                    <i class="fa-solid fa-globe text-6xl text-white/20 mb-6"></i>
                    <h3 class="text-2xl font-semibold mb-2">Click a planet</h3>
                    <p class="text-white/60">Select any planet in the 3D view to see real NASA data</p>
                </div>
            </div>
            
            <div id="planet-info" class="hidden">
                <div class="flex items-center gap-x-4 mb-6">
                    <div id="planet-icon" class="text-6xl"></div>
                    <div>
                        <div id="planet-name" class="text-4xl font-bold tracking-tight"></div>
                        <div id="planet-subtitle" class="text-orange-400 text-sm font-mono"></div>
                    </div>
                </div>

                <div class="space-y-5 text-sm">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white/5 rounded-2xl p-4">
                            <div class="text-white/60 text-xs">DIAMETER</div>
                            <div id="planet-diameter" class="font-semibold text-xl"></div>
                        </div>
                        <div class="bg-white/5 rounded-2xl p-4">
                            <div class="text-white/60 text-xs">DISTANCE FROM SUN</div>
                            <div id="planet-distance" class="font-semibold text-xl"></div>
                        </div>
                        <div class="bg-white/5 rounded-2xl p-4">
                            <div class="text-white/60 text-xs">ORBITAL PERIOD</div>
                            <div id="planet-period" class="font-semibold text-xl"></div>
                        </div>
                        <div class="bg-white/5 rounded-2xl p-4">
                            <div class="text-white/60 text-xs">AVG TEMP</div>
                            <div id="planet-temp" class="font-semibold text-xl"></div>
                        </div>
                    </div>

                    <div>
                        <div class="text-white/60 text-xs mb-1">MOONS</div>
                        <div id="planet-moons" class="font-semibold"></div>
                    </div>

                    <div>
                        <div class="text-white/60 text-xs mb-1.5">INTERESTING FACTS</div>
                        <div id="planet-facts" class="text-white/90 leading-relaxed text-[13px]"></div>
                    </div>
                </div>

                <button onclick="hidePlanetInfo()" 
                        class="mt-6 w-full py-3 rounded-3xl border border-white/20 hover:bg-white/5 text-sm">
                    Close
                </button>
            </div>
        </div>
    </div>

    <script>
        // Three.js Setup
        let scene, camera, renderer;
        let planets = [];
        let sun;
        let isPaused = false;
        let timeSpeed = 100;
        let simulationTime = 0;
        let raycaster, mouse;
        let selectedPlanet = null;

        // Real planet data (NASA accurate)
        const planetData = {
            mercury: {
                name: "Mercury",
                radius: 0.18,
                distance: 5.85,        // scaled AU
                period: 0.241,         // years
                color: 0xaaaaaa,
                diameter: "4,879 km",
                realDistance: "57.9 million km (0.39 AU)",
                orbitalPeriod: "88 Earth days",
                avgTemp: "167°C (day) / -180°C (night)",
                moons: "0",
                facts: "Smallest planet and closest to the Sun. Extreme temperature swings. No atmosphere to retain heat."
            },
            venus: {
                name: "Venus",
                radius: 0.28,
                distance: 10.8,
                period: 0.615,
                color: 0xe8c48a,
                diameter: "12,104 km",
                realDistance: "108.2 million km (0.72 AU)",
                orbitalPeriod: "225 Earth days",
                avgTemp: "462°C (hottest planet)",
                moons: "0",
                facts: "Rotates backwards. Thick toxic atmosphere creates runaway greenhouse effect. Hottest surface temperature in the solar system."
            },
            earth: {
                name: "Earth",
                radius: 0.3,
                distance: 15,
                period: 1.0,
                color: 0x4a90e2,
                diameter: "12,742 km",
                realDistance: "149.6 million km (1 AU)",
                orbitalPeriod: "365.25 days",
                avgTemp: "15°C",
                moons: "1 (The Moon)",
                facts: "Only planet with confirmed life. 71% covered in water. Perfect distance from Sun for liquid water."
            },
            mars: {
                name: "Mars",
                radius: 0.22,
                distance: 22.5,
                period: 1.881,
                color: 0xc1440e,
                diameter: "6,779 km",
                realDistance: "227.9 million km (1.52 AU)",
                orbitalPeriod: "687 Earth days",
                avgTemp: "-63°C",
                moons: "2 (Phobos &amp; Deimos)",
                facts: "Home to Olympus Mons, the tallest mountain in the solar system (22 km high). Once had liquid water. Target for human colonization."
            },
            jupiter: {
                name: "Jupiter",
                radius: 1.1,
                distance: 52,
                period: 11.86,
                color: 0xd8ca9d,
                diameter: "139,820 km",
                realDistance: "778.5 million km (5.2 AU)",
                orbitalPeriod: "11.86 Earth years",
                avgTemp: "-108°C",
                moons: "95 (including Europa, Ganymede, Callisto)",
                facts: "Largest planet. Great Red Spot is a storm raging for 400+ years. Strongest magnetic field. Has more mass than all other planets combined."
            },
            saturn: {
                name: "Saturn",
                radius: 0.95,
                distance: 95,
                period: 29.46,
                color: 0xe8d5a3,
                diameter: "120,536 km",
                realDistance: "1.43 billion km (9.58 AU)",
                orbitalPeriod: "29.46 Earth years",
                avgTemp: "-138°C",
                moons: "146 (including Titan)",
                facts: "Least dense planet (would float in water). Spectacular ring system made of ice and rock. Has a hexagonal storm at its north pole."
            },
            uranus: {
                name: "Uranus",
                radius: 0.65,
                distance: 190,
                period: 84.01,
                color: 0x9fc4e7,
                diameter: "51,118 km",
                realDistance: "2.87 billion km (19.18 AU)",
                orbitalPeriod: "84 Earth years",
                avgTemp: "-195°C",
                moons: "28",
                facts: "Rotates on its side (98° tilt). Discovered in 1781. Faint rings. Coldest planetary atmosphere in the solar system."
            },
            neptune: {
                name: "Neptune",
                radius: 0.62,
                distance: 300,
                period: 164.79,
                color: 0x5b7cff,
                diameter: "49,528 km",
                realDistance: "4.5 billion km (30.07 AU)",
                orbitalPeriod: "164.8 Earth years",
                avgTemp: "-200°C",
                moons: "16 (including Triton)",
                facts: "Strongest winds in the solar system (2,100 km/h). Deep blue color from methane. Only planet discovered by mathematical prediction before observation."
            }
        };

        function initThreeJS() {
            const canvas = document.getElementById('canvas');
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth - 384, window.innerHeight - 64);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, (window.innerWidth - 384) / (window.innerHeight - 64), 0.1, 2000);
            camera.position.set(0, 80, 220);

            // Lights
            const ambient = new THREE.AmbientLight(0x404040, 0.6);
            scene.add(ambient);
            
            const sunLight = new THREE.PointLight(0xfffbeb, 2.5, 800);
            sunLight.position.set(0, 0, 0);
            scene.add(sunLight);

            // Sun
            const sunGeometry = new THREE.SphereGeometry(4.2, 64, 64);
            const sunMaterial = new THREE.MeshBasicMaterial({ 
                color: 0xffd700,
                emissive: 0xffa500
            });
            sun = new THREE.Mesh(sunGeometry, sunMaterial);
            scene.add(sun);

            // Add glow to sun
            const glowGeometry = new THREE.SphereGeometry(5.5, 64, 64);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: 0xffaa00,
                transparent: true,
                opacity: 0.25,
                blending: THREE.AdditiveBlending
            });
            const sunGlow = new THREE.Mesh(glowGeometry, glowMaterial);
            scene.add(sunGlow);

            // Create planets
            Object.keys(planetData).forEach(key => {
                const data = planetData[key];
                const geometry = new THREE.SphereGeometry(data.radius, 48, 48);
                const material = new THREE.MeshPhongMaterial({ 
                    color: data.color,
                    shininess: 12,
                    emissive: data.color === 0x4a90e2 ? 0x112244 : 0x000000
                });
                const planet = new THREE.Mesh(geometry, material);
                planet.userData = { key: key, ...data };
                
                // Initial position
                const angle = Math.random() * Math.PI * 2;
                planet.position.x = Math.cos(angle) * data.distance;
                planet.position.z = Math.sin(angle) * data.distance;
                
                scene.add(planet);
                planets.push(planet);

                // Orbit line
                const orbitGeometry = new THREE.RingGeometry(data.distance - 0.3, data.distance + 0.3, 128);
                const orbitMaterial = new THREE.MeshBasicMaterial({ 
                    color: 0x444444, 
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.35 
                });
                const orbit = new THREE.Mesh(orbitGeometry, orbitMaterial);
                orbit.rotation.x = Math.PI / 2;
                scene.add(orbit);
            });

            // Stars
            const starGeometry = new THREE.BufferGeometry();
            const starCount = 18000;
            const positions = new Float32Array(starCount * 3);
            for (let i = 0; i < starCount * 3; i++) {
                positions[i] = (Math.random() - 0.5) * 1400;
            }
            starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.8 });
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);

            // Raycaster for clicking
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // Event listeners
            window.addEventListener('resize', onWindowResize);
            canvas.addEventListener('click', onPlanetClick);
            canvas.addEventListener('mousemove', onMouseMove);

            // Basic orbit controls (mouse drag)
            let isDragging = false;
            let previousMouseX = 0;
            let previousMouseY = 0;

            canvas.addEventListener('mousedown', (e) => {
                if (e.button === 0) isDragging = true;
                previousMouseX = e.clientX;
                previousMouseY = e.clientY;
            });

            window.addEventListener('mouseup', () => isDragging = false);

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const deltaX = e.clientX - previousMouseX;
                const deltaY = e.clientY - previousMouseY;
                
                const spherical = new THREE.Spherical();
                spherical.setFromVector3(camera.position);
                spherical.theta -= deltaX * 0.003;
                spherical.phi -= deltaY * 0.003;
                spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi));
                
                camera.position.setFromSpherical(spherical);
                camera.lookAt(0, 0, 0);
                
                previousMouseX = e.clientX;
                previousMouseY = e.clientY;
            });

            // Zoom with wheel
            canvas.addEventListener('wheel', (e) => {
                const direction = e.deltaY > 0 ? 1 : -1;
                camera.position.multiplyScalar(1 + direction * 0.08);
            });

            animate();
        }

        function onWindowResize() {
            const canvas = document.getElementById('canvas');
            camera.aspect = (window.innerWidth - 384) / (window.innerHeight - 64);
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth - 384, window.innerHeight - 64);
        }

        function onPlanetClick(event) {
            const rect = event.target.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(planets);

            if (intersects.length > 0) {
                const planet = intersects[0].object;
                showPlanetInfo(planet.userData.key);
            }
        }

        function onMouseMove(event) {
            // Optional: highlight on hover (can be added later)
        }

        function showPlanetInfo(planetKey) {
            const data = planetData[planetKey];
            if (!data) return;

            document.getElementById('default-info').classList.add('hidden');
            document.getElementById('planet-info').classList.remove('hidden');

            document.getElementById('planet-icon').innerHTML = getPlanetEmoji(planetKey);
            document.getElementById('planet-name').innerText = data.name;
            document.getElementById('planet-subtitle').innerText = data.realDistance;
            
            document.getElementById('planet-diameter').innerText = data.diameter;
            document.getElementById('planet-distance').innerText = data.realDistance;
            document.getElementById('planet-period').innerText = data.orbitalPeriod;
            document.getElementById('planet-temp').innerText = data.avgTemp;
            document.getElementById('planet-moons').innerText = data.moons;
            document.getElementById('planet-facts').innerText = data.facts;
        }

        function getPlanetEmoji(key) {
            const emojis = {
                mercury: '☿️', venus: '♀️', earth: '🌍', mars: '♂️',
                jupiter: '♃️', saturn: '♄️', uranus: '♅️', neptune: '♆️'
            };
            return emojis[key] || '🌌';
        }

        function hidePlanetInfo() {
            document.getElementById('planet-info').classList.add('hidden');
            document.getElementById('default-info').classList.remove('hidden');
        }

        function updateSpeed() {
            timeSpeed = parseFloat(document.getElementById('speed-slider').value);
            document.getElementById('speed-value').innerText = timeSpeed + '×';
        }

        function togglePause() {
            isPaused = !isPaused;
            const icon = document.getElementById('pause-icon');
            const text = document.getElementById('pause-text');
            
            if (isPaused) {
                icon.classList.remove('fa-pause');
                icon.classList.add('fa-play');
                text.innerText = 'Resume';
            } else {
                icon.classList.remove('fa-play');
                icon.classList.add('fa-pause');
                text.innerText = 'Pause';
            }
        }

        function resetCamera() {
            camera.position.set(0, 80, 220);
            camera.lookAt(0, 0, 0);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (!isPaused) {
                simulationTime += 0.0008 * timeSpeed;

                planets.forEach(planet => {
                    const data = planet.userData;
                    const angle = (simulationTime / data.period) * Math.PI * 2;
                    planet.position.x = Math.cos(angle) * data.distance;
                    planet.position.z = Math.sin(angle) * data.distance;
                    
                    // Self rotation
                    planet.rotation.y += 0.008;
                });
            }

            // Gentle sun pulse
            if (sun) {
                sun.scale.setScalar(1 + Math.sin(Date.now() / 600) * 0.015);
            }

            renderer.render(scene, camera);
        }

        // Initialize everything
        function init() {
            initThreeJS();
            
            // Set initial speed
            document.getElementById('speed-slider').value = 100;
            document.getElementById('speed-value').innerText = '100×';
            timeSpeed = 100;

            // Auto-select Earth after 2 seconds for demo
            setTimeout(() => {
                if (document.getElementById('default-info').classList.contains('hidden') === false) {
                    showPlanetInfo('earth');
                }
            }, 2200);

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ') {
                    e.preventDefault();
                    togglePause();
                }
                if (e.key.toLowerCase() === 'r') {
                    resetCamera();
                }
            });

            console.log('%c[Real Solar System] Accurate 3D model initialized with real NASA data.', 'color:#f59e0b');
        }

        window.onload = init;
    </script>
</body>
</html>
