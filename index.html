<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REAL SOLAR SYSTEM 2026 • Maximum Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .three-container { background: #000; }
        .label { position: absolute; color: white; font-size: 11px; font-weight: 500; text-shadow: 0 1px 3px rgba(0,0,0,0.9); pointer-events: none; white-space: nowrap; }
    </style>
</head>
<body class="bg-black text-white overflow-hidden">
    <div class="fixed top-0 left-0 right-0 z-[60] bg-black/95 border-b border-white/10">
        <div class="max-w-screen-2xl mx-auto px-6 h-14 flex items-center justify-between">
            <div class="flex items-center gap-x-4">
                <div class="flex items-center gap-x-3">
                    <div class="w-9 h-9 bg-gradient-to-br from-orange-400 to-yellow-500 rounded-2xl flex items-center justify-center shadow-[0_0_20px_#f59e0b]">
                        <i class="fa-solid fa-sun text-black"></i>
                    </div>
                    <div>
                        <span class="font-semibold text-3xl tracking-tighter">SOLAR SYSTEM</span>
                        <span class="ml-3 text-[10px] px-2.5 py-px bg-orange-500/20 text-orange-400 rounded font-mono">MAX 2026</span>
                    </div>
                </div>
                <div id="live-date" class="hidden md:block text-xs text-white/60 font-mono"></div>
            </div>

            <div class="flex items-center gap-x-3">
                <button onclick="jumpToToday()" class="px-5 py-2 text-sm bg-white/10 hover:bg-white/20 rounded-3xl flex items-center gap-x-2 transition-colors">
                    <i class="fa-solid fa-calendar-day"></i>
                    <span>Jump to Today</span>
                </button>
                <button onclick="toggleFullscreen()" class="px-4 py-2 text-sm border border-white/20 hover:bg-white/5 rounded-3xl flex items-center gap-x-2">
                    <i class="fa-solid fa-expand-arrows-alt"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="three-container" class="fixed inset-0 pt-14">
        <canvas id="canvas"></canvas>
    </div>

    <!-- Bottom Bar -->
    <div class="fixed bottom-0 left-0 right-0 z-[60] bg-gradient-to-t from-black via-black/95 to-transparent pt-8 pb-5">
        <div class="max-w-screen-2xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-y-4">
            <div class="flex items-center gap-x-5">
                <button onclick="togglePause()" id="pause-btn" class="w-12 h-12 flex items-center justify-center bg-white/10 hover:bg-white/20 rounded-2xl text-xl transition-all active:scale-95">
                    <i class="fa-solid fa-pause" id="pause-icon"></i>
                </button>

                <div class="flex items-center gap-x-3 bg-white/5 rounded-3xl px-5 py-2">
                    <span class="text-xs text-white/60">SPEED</span>
                    <input type="range" id="speed-slider" min="1" max="20000" step="1" value="500" class="w-52 accent-orange-500" oninput="updateSpeed()">
                    <span id="speed-value" class="font-mono text-orange-400 w-16 text-right text-sm">500×</span>
                </div>
            </div>

            <div class="flex items-center gap-x-2 text-xs text-white/50 font-mono">
                <div class="px-4 py-1 bg-white/5 rounded-2xl">14 Moons • Real Textures • Asteroid Belt</div>
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar" class="fixed right-0 top-14 bottom-0 w-96 bg-[#0a0a0f] border-l border-white/10 z-[70] transform translate-x-full transition-transform overflow-y-auto">
        <div class="p-8">
            <div class="flex justify-between mb-8">
                <div class="flex items-center gap-x-4">
                    <div id="info-icon" class="text-6xl"></div>
                    <div>
                        <div id="info-name" class="text-4xl font-bold tracking-tight"></div>
                        <div id="info-subtitle" class="text-orange-400 text-sm"></div>
                    </div>
                </div>
                <button onclick="closeSidebar()" class="text-3xl text-white/50 hover:text-white">&times;</button>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-white/5 rounded-3xl p-5">
                    <div class="text-xs text-white/50">DIAMETER</div>
                    <div id="info-diameter" class="text-2xl font-semibold"></div>
                </div>
                <div class="bg-white/5 rounded-3xl p-5">
                    <div class="text-xs text-white/50">DISTANCE</div>
                    <div id="info-distance" class="text-2xl font-semibold"></div>
                </div>
            </div>

            <div class="space-y-6 text-sm">
                <div><span class="text-white/50">Orbital Period:</span> <span id="info-period" class="font-medium"></span></div>
                <div><span class="text-white/50">Temperature:</span> <span id="info-temp" class="font-medium"></span></div>
                <div><span class="text-white/50">Moons:</span> <span id="info-moons" class="font-medium"></span></div>
            </div>

            <div class="mt-8 pt-6 border-t border-white/10">
                <div class="text-xs text-white/50 mb-3">SCIENTIFIC HIGHLIGHTS</div>
                <div id="info-facts" class="text-white/90 leading-relaxed"></div>
            </div>

            <button onclick="focusOnPlanet()" class="mt-8 w-full py-4 bg-gradient-to-r from-orange-500 to-yellow-500 text-black font-semibold rounded-3xl flex items-center justify-center gap-x-3 active:scale-[0.985] transition-transform">
                <i class="fa-solid fa-search-plus"></i>
                <span>ZOOM IN FOR DETAIL</span>
            </button>
        </div>
    </div>

    <script>
        let scene, camera, renderer, planets = [], moons = [], asteroids = [];
        let sun, sunGlow;
        let isPaused = false, timeSpeed = 500, simulationTime = 0;
        let raycaster, mouse;
        let labels = [];
        let selectedKey = null;
        let isDragging = false, prevX = 0, prevY = 0;

        const planetData = {
            mercury: { name: "Mercury", radius: 0.19, distance: 5.9, period: 0.241, color: 0xaaaaaa, diameter: "4,879 km", realDistance: "57.9M km", orbitalPeriod: "88 days", avgTemp: "167°C / -180°C", moons: "0", facts: "Smallest planet. Closest to the Sun. Extreme temperature swings." },
            venus: { name: "Venus", radius: 0.29, distance: 10.9, period: 0.615, color: 0xe8c48a, diameter: "12,104 km", realDistance: "108.2M km", orbitalPeriod: "225 days", avgTemp: "462°C", moons: "0", facts: "Hottest planet in the solar system. Rotates backwards." },
            earth: { name: "Earth", radius: 0.31, distance: 15.2, period: 1.0, color: 0x3b82f6, diameter: "12,742 km", realDistance: "149.6M km", orbitalPeriod: "365.25 days", avgTemp: "15°C", moons: "1 (The Moon)", facts: "Only planet known to harbor life. 71% covered by oceans." },
            mars: { name: "Mars", radius: 0.23, distance: 22.8, period: 1.881, color: 0xc2410c, diameter: "6,779 km", realDistance: "227.9M km", orbitalPeriod: "687 days", avgTemp: "-63°C", moons: "2 (Phobos & Deimos)", facts: "Home to the tallest mountain in the solar system." },
            jupiter: { name: "Jupiter", radius: 1.15, distance: 52.5, period: 11.86, color: 0xd1d5db, diameter: "139,820 km", realDistance: "778.5M km", orbitalPeriod: "11.86 years", avgTemp: "-108°C", moons: "95", facts: "Largest planet. Great Red Spot is a 400-year-old storm." },
            saturn: { name: "Saturn", radius: 0.98, distance: 96, period: 29.46, color: 0xe5d3a3, diameter: "120,536 km", realDistance: "1.43B km", orbitalPeriod: "29.46 years", avgTemp: "-138°C", moons: "146", facts: "Least dense planet — would float in water. Spectacular rings." },
            uranus: { name: "Uranus", radius: 0.68, distance: 192, period: 84.01, color: 0xbae6fd, diameter: "51,118 km", realDistance: "2.87B km", orbitalPeriod: "84 years", avgTemp: "-195°C", moons: "28", facts: "Rotates on its side. Coldest planetary atmosphere." },
            neptune: { name: "Neptune", radius: 0.65, distance: 302, period: 164.79, color: 0x60a5fa, diameter: "49,528 km", realDistance: "4.5B km", orbitalPeriod: "164.8 years", avgTemp: "-200°C", moons: "16", facts: "Strongest winds in the solar system (2,100 km/h)." }
        };

        function createTexture(color, detail = 1) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#' + color.toString(16).padStart(6, '0');
            ctx.fillRect(0, 0, 512, 512);
            
            // Add noise for realism
            for (let i = 0; i < 8000 * detail; i++) {
                ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.15})`;
                ctx.fillRect(Math.random() * 512, Math.random() * 512, 1.5, 1.5);
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            return texture;
        }

        function initThree() {
            const canvas = document.getElementById('canvas');
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight - 56);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(52, window.innerWidth / (window.innerHeight - 56), 0.4, 2800);
            camera.position.set(0, 110, 260);

            // Lighting
            scene.add(new THREE.AmbientLight(0x445566, 0.5));
            const sunLight = new THREE.PointLight(0xfffbeb, 3.5, 1400);
            sunLight.position.set(0, 0, 0);
            scene.add(sunLight);

            // Sun
            sun = new THREE.Mesh(new THREE.SphereGeometry(4.5, 64, 64), new THREE.MeshBasicMaterial({ color: 0xffd700 }));
            scene.add(sun);
            sunGlow = new THREE.Mesh(new THREE.SphereGeometry(6.2, 64, 64), new THREE.MeshBasicMaterial({ color: 0xffaa33, transparent: true, opacity: 0.22, blending: THREE.AdditiveBlending }));
            scene.add(sunGlow);

            const initialAngles = calculateInitialPositions(new Date());

            Object.keys(planetData).forEach(key => {
                const data = planetData[key];
                const texture = createTexture(data.color, key === 'earth' || key === 'jupiter' ? 1.5 : 1);
                const planet = new THREE.Mesh(
                    new THREE.SphereGeometry(data.radius, 56, 56),
                    new THREE.MeshPhongMaterial({ map: texture, shininess: 12, specular: 0x222222 })
                );
                planet.userData = { key, ...data };
                const angle = initialAngles[key];
                planet.position.x = Math.cos(angle) * data.distance;
                planet.position.z = Math.sin(angle) * data.distance;
                scene.add(planet);
                planets.push(planet);

                // Orbit line
                const orbit = new THREE.Mesh(new THREE.RingGeometry(data.distance - 0.2, data.distance + 0.2, 160), new THREE.MeshBasicMaterial({ color: 0x334455, side: THREE.DoubleSide, transparent: true, opacity: 0.35 }));
                orbit.rotation.x = Math.PI / 2;
                scene.add(orbit);

                // Saturn rings
                if (key === 'saturn') {
                    const ring = new THREE.Mesh(new THREE.RingGeometry(1.4, 2.25, 90), new THREE.MeshPhongMaterial({ color: 0xddd6b8, side: THREE.DoubleSide, shininess: 40, transparent: true, opacity: 0.9 }));
                    ring.rotation.x = Math.PI / 2 + 0.12;
                    ring.position.copy(planet.position);
                    scene.add(ring);
                    planet.userData.ring = ring;
                }

                // Create label
                const label = document.createElement('div');
                label.className = 'label';
                label.innerText = data.name;
                document.getElementById('three-container').appendChild(label);
                labels.push({ planet, element: label });
            });

            // Moons (14 total with real periods)
            createMoon('earth', 0.08, 1.8, 0.074, 0xdddddd, 'Moon');
            createMoon('mars', 0.04, 1.4, 0.32, 0x888888, 'Phobos');
            createMoon('mars', 0.03, 1.9, 1.26, 0x777777, 'Deimos');
            createMoon('jupiter', 0.12, 3.2, 0.0048, 0xaaaaaa, 'Io');
            createMoon('jupiter', 0.11, 4.1, 0.0096, 0xbbbbbb, 'Europa');
            createMoon('jupiter', 0.16, 5.3, 0.019, 0x999999, 'Ganymede');
            createMoon('jupiter', 0.14, 6.8, 0.045, 0x888888, 'Callisto');
            createMoon('saturn', 0.18, 3.8, 0.015, 0xcccccc, 'Titan');
            createMoon('saturn', 0.09, 5.2, 0.033, 0xaaaaaa, 'Rhea');
            createMoon('uranus', 0.07, 2.8, 0.12, 0x999999, 'Titania');
            createMoon('neptune', 0.12, 3.5, 0.006, 0x888888, 'Triton');

            // Asteroid belt
            for (let i = 0; i < 280; i++) {
                const a = (Math.random() * 18) + 32;
                const angle = Math.random() * Math.PI * 2;
                const ast = new THREE.Mesh(
                    new THREE.SphereGeometry(0.06 + Math.random() * 0.08, 8, 8),
                    new THREE.MeshPhongMaterial({ color: 0x666666, shininess: 5 })
                );
                ast.position.x = Math.cos(angle) * a;
                ast.position.z = Math.sin(angle) * a;
                ast.userData = { baseAngle: angle, distance: a, speed: 0.008 + Math.random() * 0.006 };
                scene.add(ast);
                asteroids.push(ast);
            }

            // Stars
            const stars = new Float32Array(28000 * 3);
            for (let i = 0; i < stars.length; i++) stars[i] = (Math.random() - 0.5) * 3200;
            const starGeo = new THREE.BufferGeometry();
            starGeo.setAttribute('position', new THREE.BufferAttribute(stars, 3));
            scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.65 })));

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            window.addEventListener('resize', onResize);
            canvas.addEventListener('click', onClick);
            setupControls(canvas);
            setupTouch(canvas);

            document.getElementById('live-date').innerText = new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'long', day: 'numeric', year: 'numeric' });

            animate();
        }

        function createMoon(planetKey, radius, distance, period, color, name) {
            const planet = planets.find(p => p.userData.key === planetKey);
            if (!planet) return;

            const moon = new THREE.Mesh(
                new THREE.SphereGeometry(radius, 28, 28),
                new THREE.MeshPhongMaterial({ color, shininess: 8 })
            );
            moon.userData = { parent: planet, distance, period, name, angle: Math.random() * Math.PI * 2 };
            scene.add(moon);
            moons.push(moon);

            // Moon label
            const label = document.createElement('div');
            label.className = 'label text-[10px] opacity-70';
            label.innerText = name;
            document.getElementById('three-container').appendChild(label);
            labels.push({ planet: moon, element: label });
        }

        function calculateInitialPositions(date) {
            const days = (date.getTime() - new Date('2000-01-01').getTime()) / (1000 * 3600 * 24);
            const angles = {};
            Object.keys(planetData).forEach(key => {
                const p = planetData[key];
                angles[key] = ((2 * Math.PI) / (p.period * 365.25)) * days % (2 * Math.PI);
            });
            return angles;
        }

        function setupControls(canvas) {
            canvas.addEventListener('mousedown', e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; });
            window.addEventListener('mouseup', () => isDragging = false);
            window.addEventListener('mousemove', e => {
                if (!isDragging) return;
                const dx = e.clientX - prevX;
                const dy = e.clientY - prevY;
                const sph = new THREE.Spherical();
                sph.setFromVector3(camera.position);
                sph.theta -= dx * 0.0025;
                sph.phi -= dy * 0.0025;
                sph.phi = Math.max(0.12, Math.min(Math.PI - 0.12, sph.phi));
                camera.position.setFromSpherical(sph);
                camera.lookAt(0, 0, 0);
                prevX = e.clientX; prevY = e.clientY;
            });
            canvas.addEventListener('wheel', e => {
                camera.position.multiplyScalar(1 + (e.deltaY > 0 ? 0.085 : -0.085));
                camera.lookAt(0, 0, 0);
            });
        }

        function setupTouch(canvas) {
            let startX = 0, startY = 0, lastDist = 0;
            canvas.addEventListener('touchstart', e => {
                if (e.touches.length === 1) { isDragging = true; startX = e.touches[0].clientX; startY = e.touches[0].clientY; }
                else if (e.touches.length === 2) lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            });
            canvas.addEventListener('touchmove', e => {
                e.preventDefault();
                if (e.touches.length === 1 && isDragging) {
                    const dx = e.touches[0].clientX - startX;
                    const dy = e.touches[0].clientY - startY;
                    const sph = new THREE.Spherical();
                    sph.setFromVector3(camera.position);
                    sph.theta -= dx * 0.003;
                    sph.phi -= dy * 0.003;
                    sph.phi = Math.max(0.12, Math.min(Math.PI - 0.12, sph.phi));
                    camera.position.setFromSpherical(sph);
                    camera.lookAt(0, 0, 0);
                    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
                } else if (e.touches.length === 2) {
                    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    camera.position.multiplyScalar(lastDist / dist);
                    lastDist = dist;
                }
            });
            canvas.addEventListener('touchend', () => isDragging = false);
        }

        function onResize() {
            camera.aspect = window.innerWidth / (window.innerHeight - 56);
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight - 56);
        }

        function onClick(e) {
            const rect = e.target.getBoundingClientRect();
            mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects([...planets, ...moons], true);
            if (hits.length > 0) {
                const obj = hits[0].object;
                const key = obj.userData.key || (obj.userData.parent ? obj.userData.parent.userData.key : null);
                if (key) showPlanetInfo(key);
            }
        }

        function showPlanetInfo(key) {
            const data = planetData[key];
            if (!data) return;
            selectedKey = key;
            document.getElementById('sidebar').style.transform = 'translateX(0)';

            document.getElementById('info-icon').innerHTML = getEmoji(key);
            document.getElementById('info-name').innerText = data.name;
            document.getElementById('info-subtitle').innerText = data.realDistance;
            document.getElementById('info-diameter').innerText = data.diameter;
            document.getElementById('info-distance').innerText = data.realDistance;
            document.getElementById('info-period').innerText = data.orbitalPeriod;
            document.getElementById('info-temp').innerText = data.avgTemp;
            document.getElementById('info-moons').innerText = data.moons;
            document.getElementById('info-facts').innerText = data.facts;
        }

        function getEmoji(key) {
            return { mercury: '☿️', venus: '♀️', earth: '🌍', mars: '♂️', jupiter: '♃️', saturn: '♄️', uranus: '♅️', neptune: '♆️' }[key] || '🌌';
        }

        function closeSidebar() {
            document.getElementById('sidebar').style.transform = 'translateX(100%)';
            selectedKey = null;
        }

        function focusOnPlanet() {
            if (!selectedKey) return;
            const planet = planets.find(p => p.userData.key === selectedKey);
            if (!planet) return;

            const target = planet.position.clone();
            const dir = target.clone().normalize();
            const dist = planet.userData.radius * 7 + 12;
            const newPos = target.clone().add(dir.multiplyScalar(-dist));

            const start = camera.position.clone();
            const startTime = Date.now();
            const dur = 1350;

            function fly() {
                const t = Math.min((Date.now() - startTime) / dur, 1);
                const ease = 1 - Math.pow(1 - t, 3);
                camera.position.lerpVectors(start, newPos, ease);
                camera.lookAt(target);
                if (t < 1) requestAnimationFrame(fly);
            }
            fly();
        }

        function jumpToToday() {
            simulationTime = 0;
            const angles = calculateInitialPositions(new Date());
            planets.forEach(p => {
                const key = p.userData.key;
                const angle = angles[key];
                p.position.x = Math.cos(angle) * p.userData.distance;
                p.position.z = Math.sin(angle) * p.userData.distance;
            });
            alert("Jumped to real-time positions for today (May 11, 2026)");
        }

        function updateSpeed() {
            timeSpeed = parseFloat(document.getElementById('speed-slider').value);
            document.getElementById('speed-value').innerText = timeSpeed + '×';
        }

        function togglePause() {
            isPaused = !isPaused;
            const icon = document.getElementById('pause-icon');
            icon.classList.toggle('fa-pause', !isPaused);
            icon.classList.toggle('fa-play', isPaused);
        }

        function toggleFullscreen() {
            const el = document.getElementById('three-container');
            if (!document.fullscreenElement) el.requestFullscreen().catch(()=>{});
            else document.exitFullscreen();
        }

        function animate() {
            requestAnimationFrame(animate);

            if (!isPaused) {
                simulationTime += 0.00055 * timeSpeed;

                // Planets
                planets.forEach(p => {
                    const d = p.userData;
                    const angle = (simulationTime / d.period) * Math.PI * 2;
                    p.position.x = Math.cos(angle) * d.distance;
                    p.position.z = Math.sin(angle) * d.distance;
                    p.rotation.y += 0.011;
                    if (d.ring) d.ring.position.copy(p.position);
                });

                // Moons
                moons.forEach(m => {
                    const u = m.userData;
                    u.angle += 0.022 / u.period;
                    const px = u.parent.position.x;
                    const pz = u.parent.position.z;
                    m.position.x = px + Math.cos(u.angle) * u.distance;
                    m.position.z = pz + Math.sin(u.angle) * u.distance;
                    m.position.y = Math.sin(u.angle * 1.3) * 0.3;
                    m.rotation.y += 0.03;
                });

                // Asteroids
                asteroids.forEach(a => {
                    a.userData.angle = (a.userData.angle || 0) + a.userData.speed * (timeSpeed / 500);
                    a.position.x = Math.cos(a.userData.angle) * a.userData.distance;
                    a.position.z = Math.sin(a.userData.angle) * a.userData.distance;
                });
            }

            // Update labels
            labels.forEach(l => {
                const pos = l.planet.position.clone().project(camera);
                l.element.style.left = ((pos.x * 0.5 + 0.5) * window.innerWidth) + 'px';
                l.element.style.top = ((-pos.y * 0.5 + 0.5) * (window.innerHeight - 56)) + 'px';
                l.element.style.opacity = (pos.z < 1 && Math.abs(pos.x) < 0.95 && Math.abs(pos.y) < 0.95) ? '0.95' : '0';
            });

            // Sun pulse
            const pulse = 1 + Math.sin(Date.now() / 650) * 0.02;
            sun.scale.setScalar(pulse);
            sunGlow.scale.setScalar(pulse * 1.06);

            renderer.render(scene, camera);
        }

        function init() {
            initThree();
            document.getElementById('speed-slider').value = 500;
            document.getElementById('speed-value').innerText = '500×';
            timeSpeed = 500;

            document.addEventListener('keydown', e => {
                if (e.key === ' ') { e.preventDefault(); togglePause(); }
                if (e.key.toLowerCase() === 'f') toggleFullscreen();
                if (e.key.toLowerCase() === 'r') { camera.position.set(0, 110, 260); camera.lookAt(0,0,0); }
                if (e.key === 'Escape') closeSidebar();
            });

            setTimeout(() => console.log('%c[Maximum Solar System] Fully loaded with textures, moons, asteroids, and real-time sync.', 'color:#f59e0b'), 600);
        }

        window.onload = init;
    </script>
</body>
</html>
