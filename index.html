<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real 3D Solar System • Live 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', 'Inter', sans-serif; }
        .three-container { background: #000000; }
        canvas { display: block; }
        .planet-label { position: absolute; background: rgba(15,23,42,0.85); color: white; padding: 4px 10px; border-radius: 6px; font-size: 12px; pointer-events: none; white-space: nowrap; }
    </style>
</head>
<body class="bg-black text-white overflow-hidden">
    <!-- Top Bar -->
    <div class="fixed top-0 left-0 right-0 z-50 bg-black/90 border-b border-white/10 backdrop-blur-xl">
        <div class="max-w-screen-2xl mx-auto px-6 h-14 flex items-center justify-between">
            <div class="flex items-center gap-x-4">
                <div class="flex items-center gap-x-3">
                    <div class="w-8 h-8 bg-gradient-to-br from-orange-500 via-yellow-500 to-amber-400 rounded-2xl flex items-center justify-center">
                        <i class="fa-solid fa-sun text-black text-lg"></i>
                    </div>
                    <div>
                        <span class="font-semibold text-2xl tracking-tighter title-font">SOLAR SYSTEM</span>
                        <span class="ml-2 text-[10px] px-2 py-0.5 bg-white/10 rounded font-mono text-orange-400">LIVE 2026</span>
                    </div>
                </div>
                <div class="hidden md:block text-xs text-white/50 font-mono" id="current-date"></div>
            </div>

            <div class="flex items-center gap-x-2">
                <button onclick="toggleFullscreen()" 
                        class="flex items-center gap-x-2 px-4 py-2 text-sm rounded-3xl border border-white/20 hover:bg-white/5 transition-colors">
                    <i class="fa-solid fa-expand"></i>
                    <span class="hidden md:inline">Full Screen</span>
                </button>
                <button onclick="resetCamera()" 
                        class="px-4 py-2 text-sm rounded-3xl border border-white/20 hover:bg-white/5">
                    <i class="fa-solid fa-home"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- 3D View -->
    <div id="three-container" class="fixed inset-0 pt-14 three-container">
        <canvas id="canvas"></canvas>
    </div>

    <!-- Bottom Controls -->
    <div class="fixed bottom-0 left-0 right-0 z-50 bg-gradient-to-t from-black/90 to-transparent pb-6">
        <div class="max-w-screen-2xl mx-auto px-6">
            <div class="flex flex-col md:flex-row items-center justify-between gap-y-4">
                <!-- Time Controls -->
                <div class="flex items-center gap-x-4 bg-black/70 backdrop-blur-xl rounded-3xl px-5 py-3 border border-white/10">
                    <button onclick="togglePause()" id="pause-btn"
                            class="w-11 h-11 flex items-center justify-center bg-white/10 hover:bg-white/20 rounded-2xl transition-colors">
                        <i class="fa-solid fa-pause text-xl" id="pause-icon"></i>
                    </button>
                    
                    <div class="flex items-center gap-x-3">
                        <span class="text-xs text-white/60 w-8">SPEED</span>
                        <input type="range" id="speed-slider" min="0.1" max="10000" step="0.1" value="365" 
                               class="w-48 accent-orange-500" oninput="updateSpeed()">
                        <span id="speed-value" class="font-mono text-orange-400 w-20 text-right text-sm">365×</span>
                    </div>
                </div>

                <div class="text-xs text-white/50 font-mono flex items-center gap-x-2">
                    <div class="px-3 py-1 bg-white/5 rounded-2xl">Real orbital mechanics • May 2026</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Planet Info Sidebar -->
    <div id="sidebar" class="fixed right-0 top-14 bottom-0 w-80 bg-[#0a0a0f]/95 border-l border-white/10 backdrop-blur-xl z-50 transform translate-x-full transition-transform duration-300 overflow-y-auto">
        <div class="p-6">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-x-3">
                    <div id="info-icon" class="text-5xl"></div>
                    <div>
                        <div id="info-name" class="text-3xl font-bold"></div>
                        <div id="info-subtitle" class="text-orange-400 text-xs font-mono"></div>
                    </div>
                </div>
                <button onclick="closeSidebar()" class="text-white/60 hover:text-white text-2xl">&times;</button>
            </div>

            <div class="space-y-6 text-sm">
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white/5 rounded-2xl p-4">
                        <div class="text-[10px] text-white/50">DIAMETER</div>
                        <div id="info-diameter" class="font-semibold text-lg"></div>
                    </div>
                    <div class="bg-white/5 rounded-2xl p-4">
                        <div class="text-[10px] text-white/50">DISTANCE</div>
                        <div id="info-distance" class="font-semibold text-lg"></div>
                    </div>
                </div>

                <div>
                    <div class="text-[10px] text-white/50 mb-1">ORBITAL PERIOD</div>
                    <div id="info-period" class="font-semibold"></div>
                </div>

                <div>
                    <div class="text-[10px] text-white/50 mb-1">AVERAGE TEMPERATURE</div>
                    <div id="info-temp" class="font-semibold"></div>
                </div>

                <div>
                    <div class="text-[10px] text-white/50 mb-1">MOONS</div>
                    <div id="info-moons" class="font-semibold"></div>
                </div>

                <div class="pt-2">
                    <div class="text-[10px] text-white/50 mb-2">SCIENTIFIC FACTS</div>
                    <div id="info-facts" class="text-white/90 leading-relaxed text-[13px]"></div>
                </div>
            </div>

            <div class="mt-8 pt-6 border-t border-white/10">
                <button onclick="focusOnPlanet()" 
                        class="w-full py-3.5 bg-white text-black font-semibold rounded-3xl flex items-center justify-center gap-x-2 hover:bg-white/90 transition-colors">
                    <i class="fa-solid fa-search"></i>
                    <span>ZOOM IN CLOSE</span>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Three.js variables
        let scene, camera, renderer;
        let planets = [];
        let sun, sunGlow;
        let isPaused = false;
        let timeSpeed = 365;
        let simulationTime = 0;
        let raycaster, mouse;
        let selectedPlanetKey = null;
        let isDragging = false;
        let previousMouseX = 0, previousMouseY = 0;

        // Real planet data (NASA 2026)
        const planetData = {
            mercury: { name: "Mercury", radius: 0.19, distance: 5.9, period: 0.241, color: 0xaaaaaa, diameter: "4,879 km", realDistance: "57.9 million km", orbitalPeriod: "88 days", avgTemp: "167°C / -180°C", moons: "0", facts: "Smallest planet. Extreme temperatures. No atmosphere." },
            venus: { name: "Venus", radius: 0.29, distance: 10.9, period: 0.615, color: 0xe8c48a, diameter: "12,104 km", realDistance: "108.2 million km", orbitalPeriod: "225 days", avgTemp: "462°C", moons: "0", facts: "Hottest planet. Rotates backwards. Toxic atmosphere." },
            earth: { name: "Earth", radius: 0.31, distance: 15.2, period: 1.000, color: 0x3b82f6, diameter: "12,742 km", realDistance: "149.6 million km", orbitalPeriod: "365.25 days", avgTemp: "15°C", moons: "1 (Moon)", facts: "Only planet with life. 71% ocean. Perfect Goldilocks zone." },
            mars: { name: "Mars", radius: 0.23, distance: 22.8, period: 1.881, color: 0xc2410c, diameter: "6,779 km", realDistance: "227.9 million km", orbitalPeriod: "687 days", avgTemp: "-63°C", moons: "2", facts: "Tallest mountain in solar system (Olympus Mons). Past water." },
            jupiter: { name: "Jupiter", radius: 1.15, distance: 52.5, period: 11.86, color: 0xd1d5db, diameter: "139,820 km", realDistance: "778.5 million km", orbitalPeriod: "11.86 years", avgTemp: "-108°C", moons: "95", facts: "Largest planet. Great Red Spot storm for 400+ years." },
            saturn: { name: "Saturn", radius: 0.98, distance: 96, period: 29.46, color: 0xe5d3a3, diameter: "120,536 km", realDistance: "1.43 billion km", orbitalPeriod: "29.46 years", avgTemp: "-138°C", moons: "146", facts: "Least dense planet. Spectacular ice rings. Hexagonal storm." },
            uranus: { name: "Uranus", radius: 0.68, distance: 192, period: 84.01, color: 0xbae6fd, diameter: "51,118 km", realDistance: "2.87 billion km", orbitalPeriod: "84 years", avgTemp: "-195°C", moons: "28", facts: "Rotates on its side. Coldest atmosphere. Faint rings." },
            neptune: { name: "Neptune", radius: 0.65, distance: 302, period: 164.79, color: 0x60a5fa, diameter: "49,528 km", realDistance: "4.5 billion km", orbitalPeriod: "164.8 years", avgTemp: "-200°C", moons: "16", facts: "Strongest winds (2,100 km/h). Deep blue from methane." }
        };

        function calculateInitialPositions(date) {
            // Approximate current positions for May 11, 2026 using mean anomaly
            const daysSinceJ2000 = (date.getTime() - new Date('2000-01-01').getTime()) / (1000 * 3600 * 24);
            const positions = {};
            
            Object.keys(planetData).forEach(key => {
                const p = planetData[key];
                const meanMotion = (2 * Math.PI) / (p.period * 365.25);
                const meanAnomaly = (meanMotion * daysSinceJ2000) % (2 * Math.PI);
                positions[key] = meanAnomaly;
            });
            return positions;
        }

        function initThree() {
            const container = document.getElementById('three-container');
            const canvas = document.getElementById('canvas');
            
            renderer = new THREE.WebGLRenderer({ 
                canvas: canvas, 
                antialias: true, 
                alpha: true,
                powerPreference: "high-performance"
            });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight - 56);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(55, window.innerWidth / (window.innerHeight - 56), 0.5, 2500);
            camera.position.set(0, 95, 245);

            // Lighting
            scene.add(new THREE.AmbientLight(0x334455, 0.45));
            const sunLight = new THREE.PointLight(0xfffbeb, 3.2, 1200);
            sunLight.position.set(0, 0, 0);
            scene.add(sunLight);

            // Sun with glow
            const sunGeo = new THREE.SphereGeometry(4.4, 64, 64);
            sun = new THREE.Mesh(sunGeo, new THREE.MeshBasicMaterial({ color: 0xffd700 }));
            scene.add(sun);

            const glowGeo = new THREE.SphereGeometry(5.8, 64, 64);
            sunGlow = new THREE.Mesh(glowGeo, new THREE.MeshBasicMaterial({
                color: 0xffaa33, transparent: true, opacity: 0.28, blending: THREE.AdditiveBlending
            }));
            scene.add(sunGlow);

            // Create planets with better materials
            const initialAngles = calculateInitialPositions(new Date('2026-05-11'));

            Object.keys(planetData).forEach(key => {
                const data = planetData[key];
                const geometry = new THREE.SphereGeometry(data.radius, 52, 52);
                
                let material;
                if (key === 'earth') {
                    material = new THREE.MeshPhongMaterial({ 
                        color: 0x3b82f6, shininess: 25, specular: 0x222222 
                    });
                } else if (key === 'saturn') {
                    material = new THREE.MeshPhongMaterial({ 
                        color: 0xe5d3a3, shininess: 18 
                    });
                } else {
                    material = new THREE.MeshPhongMaterial({ 
                        color: data.color, shininess: 10 
                    });
                }
                
                const planet = new THREE.Mesh(geometry, material);
                planet.userData = { key, ...data };
                
                // Set real current position
                const angle = initialAngles[key];
                planet.position.x = Math.cos(angle) * data.distance;
                planet.position.z = Math.sin(angle) * data.distance;
                
                scene.add(planet);
                planets.push(planet);

                // Orbit line
                const orbit = new THREE.Mesh(
                    new THREE.RingGeometry(data.distance - 0.25, data.distance + 0.25, 140),
                    new THREE.MeshBasicMaterial({ color: 0x334455, side: THREE.DoubleSide, transparent: true, opacity: 0.4 })
                );
                orbit.rotation.x = Math.PI / 2;
                scene.add(orbit);

                // Saturn rings
                if (key === 'saturn') {
                    const ringGeo = new THREE.RingGeometry(1.35, 2.15, 80);
                    const ringMat = new THREE.MeshPhongMaterial({ 
                        color: 0xddd6b8, side: THREE.DoubleSide, shininess: 30, transparent: true, opacity: 0.85 
                    });
                    const ring = new THREE.Mesh(ringGeo, ringMat);
                    ring.rotation.x = Math.PI / 2 + 0.1;
                    ring.position.copy(planet.position);
                    scene.add(ring);
                    planet.userData.ring = ring;
                }
            });

            // Background stars
            const starCount = 22000;
            const starPos = new Float32Array(starCount * 3);
            for (let i = 0; i < starCount * 3; i++) starPos[i] = (Math.random() - 0.5) * 2800;
            const starGeo = new THREE.BufferGeometry();
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.7 })));

            // Raycaster
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // Events
            window.addEventListener('resize', onResize);
            canvas.addEventListener('click', onClick);
            setupControls(canvas);

            // Touch support for mobile
            setupTouchControls(canvas);

            // Show current date
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

            animate();
        }

        function setupControls(canvas) {
            canvas.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousMouseX = e.clientX;
                previousMouseY = e.clientY;
            });

            window.addEventListener('mouseup', () => isDragging = false);

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const deltaX = e.clientX - previousMouseX;
                const deltaY = e.clientY - previousMouseY;

                const spherical = new THREE.Spherical();
                spherical.setFromVector3(camera.position);
                spherical.theta -= deltaX * 0.0028;
                spherical.phi -= deltaY * 0.0028;
                spherical.phi = Math.max(0.15, Math.min(Math.PI - 0.15, spherical.phi));

                camera.position.setFromSpherical(spherical);
                camera.lookAt(0, 0, 0);

                previousMouseX = e.clientX;
                previousMouseY = e.clientY;
            });

            canvas.addEventListener('wheel', (e) => {
                const zoomSpeed = 0.08;
                const direction = e.deltaY > 0 ? 1 : -1;
                camera.position.multiplyScalar(1 + direction * zoomSpeed);
                camera.lookAt(0, 0, 0);
            });
        }

        function setupTouchControls(canvas) {
            let touchStartX = 0, touchStartY = 0;
            let lastTouchDistance = 0;

            canvas.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    isDragging = true;
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                } else if (e.touches.length === 2) {
                    lastTouchDistance = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                }
            });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (e.touches.length === 1 && isDragging) {
                    const deltaX = e.touches[0].clientX - touchStartX;
                    const deltaY = e.touches[0].clientY - touchStartY;

                    const spherical = new THREE.Spherical();
                    spherical.setFromVector3(camera.position);
                    spherical.theta -= deltaX * 0.003;
                    spherical.phi -= deltaY * 0.003;
                    spherical.phi = Math.max(0.15, Math.min(Math.PI - 0.15, spherical.phi));

                    camera.position.setFromSpherical(spherical);
                    camera.lookAt(0, 0, 0);

                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                } else if (e.touches.length === 2) {
                    const currentDistance = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    const zoomFactor = currentDistance / lastTouchDistance;
                    camera.position.multiplyScalar(1 / zoomFactor);
                    lastTouchDistance = currentDistance;
                }
            });

            canvas.addEventListener('touchend', () => isDragging = false);
        }

        function onResize() {
            camera.aspect = window.innerWidth / (window.innerHeight - 56);
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight - 56);
        }

        function onClick(event) {
            const rect = event.target.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(planets, true);

            if (intersects.length > 0) {
                const planet = intersects[0].object;
                showPlanetInfo(planet.userData.key);
            }
        }

        function showPlanetInfo(key) {
            const data = planetData[key];
            if (!data) return;

            selectedPlanetKey = key;

            const sidebar = document.getElementById('sidebar');
            sidebar.style.transform = 'translateX(0)';

            document.getElementById('info-icon').innerHTML = getEmoji(key);
            document.getElementById('info-name').innerText = data.name;
            document.getElementById('info-subtitle').innerText = data.realDistance;
            document.getElementById('info-diameter').innerText = data.diameter;
            document.getElementById('info-distance').innerText = data.realDistance;
            document.getElementById('info-period').innerText = data.orbitalPeriod;
            document.getElementById('info-temp').innerText = data.avgTemp;
            document.getElementById('info-moons').innerText = data.moons;
            document.getElementById('info-facts').innerText = data.facts;
        }

        function getEmoji(key) {
            const map = { mercury: '☿️', venus: '♀️', earth: '🌍', mars: '♂️', jupiter: '♃️', saturn: '♄️', uranus: '♅️', neptune: '♆️' };
            return map[key] || '🌌';
        }

        function closeSidebar() {
            document.getElementById('sidebar').style.transform = 'translateX(100%)';
            selectedPlanetKey = null;
        }

        function focusOnPlanet() {
            if (!selectedPlanetKey) return;

            const planet = planets.find(p => p.userData.key === selectedPlanetKey);
            if (!planet) return;

            const targetPos = planet.position.clone();
            const direction = targetPos.clone().normalize();
            const closeDistance = planet.userData.radius * 6.5 + 8;

            const newPos = targetPos.clone().add(direction.multiplyScalar(-closeDistance));

            // Smooth camera animation
            const startPos = camera.position.clone();
            const duration = 1200;
            const startTime = Date.now();

            function animateCamera() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 3);

                camera.position.lerpVectors(startPos, newPos, ease);
                camera.lookAt(targetPos);

                if (progress < 1) {
                    requestAnimationFrame(animateCamera);
                } else {
                    // Add slight rotation for realism when close
                    setTimeout(() => {
                        if (selectedPlanetKey) {
                            const p = planets.find(pl => pl.userData.key === selectedPlanetKey);
                            if (p) p.rotation.y += 0.3;
                        }
                    }, 400);
                }
            }
            animateCamera();
        }

        function updateSpeed() {
            timeSpeed = parseFloat(document.getElementById('speed-slider').value);
            document.getElementById('speed-value').innerText = timeSpeed.toFixed(0) + '×';
        }

        function togglePause() {
            isPaused = !isPaused;
            const icon = document.getElementById('pause-icon');
            icon.classList.toggle('fa-pause', !isPaused);
            icon.classList.toggle('fa-play', isPaused);
        }

        function toggleFullscreen() {
            const elem = document.getElementById('three-container');
            if (!document.fullscreenElement) {
                elem.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen();
            }
        }

        function resetCamera() {
            camera.position.set(0, 95, 245);
            camera.lookAt(0, 0, 0);
            closeSidebar();
        }

        function animate() {
            requestAnimationFrame(animate);

            if (!isPaused) {
                simulationTime += 0.00065 * timeSpeed;

                planets.forEach(planet => {
                    const data = planet.userData;
                    const angle = (simulationTime / data.period) * Math.PI * 2;
                    planet.position.x = Math.cos(angle) * data.distance;
                    planet.position.z = Math.sin(angle) * data.distance;

                    // Self rotation
                    planet.rotation.y += 0.012;

                    // Update Saturn ring position
                    if (planet.userData.ring) {
                        planet.userData.ring.position.copy(planet.position);
                    }
                });
            }

            // Sun breathing effect
            if (sun && sunGlow) {
                const pulse = 1 + Math.sin(Date.now() / 700) * 0.018;
                sun.scale.setScalar(pulse);
                sunGlow.scale.setScalar(pulse * 1.05);
            }

            renderer.render(scene, camera);
        }

        function init() {
            initThree();

            // Set initial speed to real-time feel (1 year per second)
            document.getElementById('speed-slider').value = 365;
            document.getElementById('speed-value').innerText = '365×';
            timeSpeed = 365;

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ') { e.preventDefault(); togglePause(); }
                if (e.key.toLowerCase() === 'f') toggleFullscreen();
                if (e.key.toLowerCase() === 'r') resetCamera();
                if (e.key === 'Escape') closeSidebar();
            });

            // Show welcome message
            setTimeout(() => {
                console.log('%c[Real Solar System] Live 3D model with real 2026 positions initialized.', 'color:#f59e0b');
            }, 800);
        }

        window.onload = init;
    </script>
</body>
</html>
